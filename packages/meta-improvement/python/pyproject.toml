[project]
name = "rsf-meta-improvement-python"
version = "1.0.0"
description = "Layer 6 Python — DSPy MIPROv2 prompt optimization, ADAS agent search, quality-diversity archive"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.30.0",
    "dspy>=2.5.0",
    "hypothesis>=6.100.0",
    "numpy>=1.26.0",
    "ollama>=0.3.0",
    "psycopg2-binary>=2.9.9",
    "pytest>=8.2.0",
    "python-dotenv>=1.0.0",
    "scipy>=1.13.0",
]

[project.optional-dependencies]
dev = [
    "mypy>=1.10.0",
    "ruff>=0.4.0",
]

[tool.setuptools.packages.find]
include = ["prompt_optimizer*", "agent_search*", "quality_archive*"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
strict = true
python_version = "3.11"
